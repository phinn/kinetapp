<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --ink-1: #f4f5f8; --ink-2: #b6bdce; --ink-3: #6b7591; --ink-4: #3a4258;
    --bg-0: #07080d; --bg-1: #0e1018; --bg-2: #161924;
    --line: #1f2330; --line-2: #2b3142;
    --c-1: #00d4c8; --c-2: #7c8cff; --c-3: #ffb547; --c-4: #ff6b8a;
    --gradient: linear-gradient(135deg, var(--c-1) 0%, var(--c-2) 35%, var(--c-3) 70%, var(--c-4) 100%);
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans', sans-serif;
    --font-serif: 'Noto Serif SC', 'Noto Serif JP', 'Songti SC', serif;
    --font-mono: 'SF Mono', 'JetBrains Mono', Menlo, monospace;
  }
  html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; scroll-behavior: smooth; }
  body {
    margin: 0; background: var(--bg-0); color: var(--ink-1);
    font-family: var(--font-sans); font-size: 17px; line-height: 1.6; font-weight: 400;
    background-image:
      radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,.5) 50%, transparent 100%),
      radial-gradient(1px 1px at 78% 32%, rgba(255,255,255,.35) 50%, transparent 100%),
      radial-gradient(1px 1px at 35% 67%, rgba(255,255,255,.4) 50%, transparent 100%),
      radial-gradient(1px 1px at 88% 81%, rgba(255,255,255,.3) 50%, transparent 100%),
      radial-gradient(1px 1px at 55% 12%, rgba(255,255,255,.25) 50%, transparent 100%);
    background-size: 100% 100%; background-attachment: fixed;
  }
  ::selection { background: rgba(124,140,255,.35); color: var(--ink-1); }
  a:focus-visible, button:focus-visible { outline: 2px solid var(--c-2); outline-offset: 4px; border-radius: 4px; }
  html[lang="ja"] body { font-family: 'Inter', 'Hiragino Sans', -apple-system, BlinkMacSystemFont, sans-serif; }

  /* ── Nav ── */
  nav { position: sticky; top: 0; z-index: 50; backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); background: rgba(7,8,13,.72); border-bottom: 1px solid var(--line); }
  nav .row { max-width: 1080px; margin: 0 auto; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  nav .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; letter-spacing: -.01em; font-size: 18px; }
  nav .brand .mark { width: 26px; height: 26px; border-radius: 7px; }
  nav .links { display: flex; gap: 22px; align-items: center; }
  nav .links a { font-size: 13px; color: var(--ink-3); transition: color .2s; }
  nav .links a:hover { color: var(--ink-1); }
  nav .navdiv { width: 1px; height: 18px; background: var(--line-2); margin: 0 4px; }
  nav .lang { display: flex; gap: 4px; }
  nav .lang button { background: transparent; border: 1px solid var(--line-2); color: var(--ink-3); border-radius: 6px; padding: 4px 9px; font-size: 11px; font-family: var(--font-mono); cursor: pointer; transition: all .15s; }
  nav .lang button:hover { color: var(--ink-1); }
  nav .lang button.on { color: #fff; border-color: var(--c-2); background: rgba(124,140,255,.18); }
  @media (max-width: 760px) { nav .links a, nav .navdiv { display: none; } }

  .wrap { max-width: 1080px; margin: 0 auto; padding: 88px 32px 120px; }
  @media (max-width: 640px) { .wrap { padding: 56px 20px 80px; } }

  /* ── Hero ── */
  .hero { text-align: center; margin-bottom: 88px; }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: .35em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 32px; }
  .eyebrow .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--c-1); vertical-align: middle; margin: 0 12px; box-shadow: 0 0 12px var(--c-1); }
  h1 { font-size: clamp(46px, 7.5vw, 88px); line-height: 1.04; letter-spacing: -.035em; font-weight: 700; margin: 0 0 28px; background: var(--gradient); background-size: 200% 200%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: hue 18s ease-in-out infinite; }
  @keyframes hue { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
  @media (prefers-reduced-motion: reduce) { h1 { animation: none; } }
  .hero .lede { font-family: var(--font-serif); font-size: clamp(18px, 2vw, 22px); line-height: 1.65; color: var(--ink-2); max-width: 640px; margin: 0 auto; font-weight: 300; }
  .hero .lede em { font-style: normal; color: var(--ink-1); border-bottom: 1px solid var(--line-2); padding-bottom: 1px; }

  /* ── Day arc ── */
  .arc { margin: 56px 0 96px; height: 220px; background: var(--bg-1); border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
  .arc svg { width: 100%; height: 100%; display: block; }

  /* ── Products ── */
  .section-label { font-family: var(--font-mono); font-size: 11px; letter-spacing: .3em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 14px; }
  .section-h { font-size: clamp(26px, 4vw, 38px); font-weight: 600; letter-spacing: -.02em; margin: 0 0 48px; }

  .products { display: grid; grid-template-columns: 1fr; gap: 1px; background: var(--line); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
  .product { display: grid; grid-template-columns: 130px 1fr; gap: 32px; padding: 44px 36px; background: var(--bg-1); transition: background .3s ease; }
  .product:hover { background: var(--bg-2); }
  .product .meta { display: flex; flex-direction: column; gap: 8px; }
  .product .num { font-family: var(--font-mono); font-size: 11px; letter-spacing: .25em; text-transform: uppercase; }
  .product .time { font-family: var(--font-serif); font-size: 14px; color: var(--ink-2); }
  .product[data-i="0"] .num { color: var(--c-1); }
  .product[data-i="1"] .num { color: var(--c-2); }
  .product[data-i="2"] .num { color: var(--c-3); }
  .product[data-i="3"] .num { color: var(--c-4); }
  .product .body h3 { font-size: 34px; font-weight: 700; letter-spacing: -.02em; margin: 0 0 4px; }
  .product .body .role { font-family: var(--font-serif); font-size: 16px; color: var(--ink-2); margin-bottom: 18px; font-weight: 300; }
  .product .body .one-liner { font-size: 22px; line-height: 1.4; font-weight: 500; margin: 0 0 16px; letter-spacing: -.01em; }
  .product .body .one-liner em { font-style: normal; background: var(--gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .product .body .details { font-size: 15px; color: var(--ink-2); line-height: 1.75; max-width: 600px; margin: 0 0 20px; }
  .product .body .details strong { color: var(--ink-1); font-weight: 600; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 22px; }
  .chip { font-size: 12px; font-family: var(--font-mono); letter-spacing: .04em; color: var(--ink-2); border: 1px solid var(--line-2); padding: 6px 12px; border-radius: 999px; background: rgba(255,255,255,.015); }

  .links-row { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .cta { display: inline-flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 700; padding: 13px 22px; border-radius: 13px; border: none; color: #fff; background: var(--gradient); box-shadow: 0 10px 26px rgba(124,140,255,.32); transition: transform .15s, box-shadow .2s; text-decoration: none; }
  .cta:hover { transform: translateY(-2px); box-shadow: 0 14px 32px rgba(124,140,255,.48); }
  .cta svg { width: 18px; height: 18px; fill: #fff; }
  .site { display: inline-flex; align-items: center; gap: 9px; font-size: 14px; font-weight: 600; padding: 13px 20px; border-radius: 13px; border: 1px solid var(--line-2); color: var(--ink-1); background: var(--bg-2); text-decoration: none; transition: transform .15s, border-color .2s, background .2s; }
  .site:hover { transform: translateY(-2px); border-color: var(--ink-3); background: #1d2030; }
  .site svg { width: 16px; height: 16px; stroke: currentColor; }

  @media (max-width: 640px) {
    .product { grid-template-columns: 1fr; gap: 12px; padding: 30px 22px; }
    .product .meta { flex-direction: row; gap: 16px; align-items: baseline; }
  }

  /* ── Ethos ── */
  .ethos { margin: 24px 0 96px; padding: 56px 48px; border: 1px solid var(--line); border-radius: 8px; background: linear-gradient(180deg, var(--bg-1), var(--bg-0)); text-align: center; }
  .ethos .lock { font-size: 32px; margin-bottom: 18px; }
  .ethos h2 { font-size: clamp(24px, 3.4vw, 32px); font-weight: 600; letter-spacing: -.02em; margin: 0 0 16px; }
  .ethos p { font-family: var(--font-serif); font-size: clamp(17px, 2vw, 20px); line-height: 1.7; color: var(--ink-2); max-width: 620px; margin: 0 auto; font-weight: 300; }
  .ethos p strong { color: var(--ink-1); font-weight: 400; border-bottom: 1px solid var(--line-2); }
  @media (max-width: 640px) { .ethos { padding: 40px 24px; } }

  /* ── Closing + footer ── */
  .closing { text-align: center; max-width: 720px; margin: 0 auto; }
  .closing .small { font-family: var(--font-mono); font-size: 11px; letter-spacing: .3em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 24px; }
  .closing p { font-family: var(--font-serif); font-size: clamp(20px, 2.4vw, 26px); line-height: 1.55; color: var(--ink-1); font-weight: 300; margin: 0 0 20px; }
  .closing .grad { background: var(--gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 600; }
  .closing .signoff { font-size: 14px; color: var(--ink-3); margin-top: 40px; }
  .closing .signoff strong { color: var(--ink-1); font-weight: 600; }
  footer { margin-top: 96px; padding-top: 32px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; font-size: 12px; color: var(--ink-3); font-family: var(--font-mono); letter-spacing: .04em; }
  footer .brand { color: var(--ink-2); }
</style>
</head>
